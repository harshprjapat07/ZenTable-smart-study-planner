<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | SmartStudy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="student.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>Student Portal</span>
        </div>
        <div class="nav-right">
            <span class="user-name">Welcome, Harsh</span>
            <button onclick="mainPage()" class="logout-btn">Logout</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <main class="main-content">
            <header class="welcome-banner">
                <h1>Ready to learn?</h1>
                <p>Check your latest assignments and track your grades.</p>
            </header>

            <section class="card">
                <div class="card-header">
                    <h3><i class="fa-solid fa-book-open"></i> Available Assignments</h3>
                </div>
                <div id="assignmentList" class="grid-list">
                    </div>
            </section>
        </main>

        <aside class="sidebar">
            <div class="card">
                <div class="card-header">
                    <h3><i class="fa-solid fa-chart-line"></i> My Progress</h3>
                </div>
                <div id="mySubmissions" class="submission-list">
                    </div>
            </div>
            <button onclick="clearAllData()" class="reset-link">Reset Account Data</button>
        </aside>
    </div>

    <div id="ai-assistant">
        <div id="chat-header" onclick="toggleChat()">
            <div class="header-info">
                <div class="status-dot"></div>
                <span>Study Buddy AI</span>
            </div>
            <i class="fa-solid fa-chevron-up" id="toggle-icon"></i>
        </div>
        
        <div id="chat-window">
            <div id="chat-content">
                <div class="msg bot-msg">Hi! I can help you with your homework or explain difficult topics. What's on your mind?</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="ai-input" placeholder="Ask a question..." onkeypress="handleEnter(event)">
                <button onclick="askBuddy()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
    <div class="timeTableM">
    <button onclick="Timetablemanager()">Manage Timetable</button>
</div>

<button onclick="clearAllData()" class="reset-link">Reset Account Data</button>

    <script src="stud.js"></script>
</body>
</html>
